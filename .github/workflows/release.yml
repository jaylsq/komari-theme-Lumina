name: Release Theme

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # 允许在 GitHub 网页上手动点击运行

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须显式声明写权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Read release metadata
        id: meta
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version)")
          THEME_VERSION=$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('komari-theme.json', 'utf8')).version)")
          THEME_SHORT=$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('komari-theme.json', 'utf8')).short)")

          # 仅在推送标签触发时，进行强匹配校验
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag version ${TAG_VERSION} does not match package.json version ${PACKAGE_VERSION}"
            exit 1
          fi

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${TAG_VERSION}" != "${THEME_VERSION}" ]; then
            echo "Tag version ${TAG_VERSION} does not match komari-theme.json version ${THEME_VERSION}"
            exit 1
          fi

          # 核心修复点 1：根据触发方式，动态决定 Release 关联的 Tag 标签名
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            RELEASE_VERSION="${TAG_VERSION}"
            TARGET_TAG="${GITHUB_REF_NAME}"
          else
            # 如果是手动触发，则将本地 json 文件里的版本号拼接成 v1.x.x 格式作为 Release 标签
            RELEASE_VERSION="${THEME_VERSION}"
            TARGET_TAG="v${THEME_VERSION}"
          fi

          echo "version=${RELEASE_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "target_tag=${TARGET_TAG}" >> "${GITHUB_OUTPUT}"
          echo "zip_name=${THEME_SHORT}-v${RELEASE_VERSION}.zip" >> "${GITHUB_OUTPUT}"

      - name: Build theme
        run: npm run build

      - name: Create theme package
        run: npm run package

      - name: Verify package contents
        run: |
          test -f preview.png
          test -f komari-theme.json
          test -f "${{ steps.meta.outputs.zip_name }}"

      - name: Upload build artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.zip_name }}
          path: ${{ steps.meta.outputs.zip_name }}
          retention-days: 30

      # 核心修复点 2：移除 if 条件，并改为动态获取 tag_name
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.target_tag }} # 动态读取标签
          name: Lumina v${{ steps.meta.outputs.version }}
          body: |
            Lumina theme release v${{ steps.meta.outputs.version }}.

            Asset:
            - `${{ steps.meta.outputs.zip_name }}`
          files: ${{ steps.meta.outputs.zip_name }}
